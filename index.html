<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhopal-oises | Your trust is our strength</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#f4fbff;
overflow-x:hidden;
}

/* HERO */
.hero{
position:relative;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
color:white;
overflow:hidden;
}

/* VIDEO BACKGROUND */
.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* OVERLAY */
.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.4);
}

.hero h1,
.hero p,
.hero .btn{
position:relative;
z-index:2;
}

.hero h1{
font-size:50px;
}

.hero p{
margin-top:10px;
}

/* BUTTON */
.btn{
margin-top:20px;
padding:12px 25px;
background:#00aaff;
border:none;
color:white;
border-radius:30px;
text-decoration:none;
}

/* SERVICES */
.services{
background:#e6f7ff;
padding:60px 20px;
text-align:center;
}

.card{
background:white;
padding:25px;
margin:15px auto;
max-width:300px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* ORDER */
#order{
padding:60px 20px;
text-align:center;
}

.form-box{
max-width:420px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input, select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
}

/* FLOAT BUTTONS */
.whatsapp-float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 18px;
border-radius:50px;
text-decoration:none;
z-index:999;
}

.call-float{
position:fixed;
bottom:80px;
right:20px;
background:#0077ff;
color:white;
padding:15px 18px;
border-radius:50px;
text-decoration:none;
z-index:999;
}

/* MAP */
.map{
width:100%;
height:400px;
border:none;
}

/* FOOTER */
footer{
background:#0a4d68;
color:white;
padding:20px;
text-align:center;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

<video autoplay muted loop playsinline>
<source src="https://cdn.pixabay.com/video/2021/09/14/88036-604684760_large.mp4" type="video/mp4">
</video>

<h1>Bhopal-oises</h1>
<p>Your trust is our strength</p>

<a class="btn" href="#order">Order Water</a>

</section>

<!-- SERVICES -->
<section class="services">
<h2>Our Services</h2>
<div class="card">Natural Water Supply</div>
<div class="card">Home Delivery</div>
<div class="card">Bulk Water Supply</div>
</section>

<!-- ORDER -->
<section id="order">
<h2>Order Water</h2>

<div class="form-box">
<input type="text" id="name" placeholder="Your Name">
<input type="text" id="address" placeholder="Address">

<select id="product">
<option>20 Litre Can</option>
<option>50 Litre Tank</option>
<option>Bulk Order</option>
</select>

<button class="btn" onclick="sendWhatsApp()">Order on WhatsApp</button>
</div>

</section>

<!-- MAP -->
<section style="text-align:center;padding:40px;">
<h2>Our Location - Bhopal</h2>
<iframe class="map"
src="https://www.google.com/maps?q=Bhopal&output=embed">
</iframe>
</section>

<footer>
© 2026 Bhopal-oises | Pure Water Delivery
</footer>

<!-- FLOATING BUTTONS -->
<a class="whatsapp-float" href="https://wa.me/919300663888">WhatsApp</a>
<a class="call-float" href="tel:+919300663888">Call</a>

<script>
function sendWhatsApp(){
let name=document.getElementById("name").value;
let address=document.getElementById("address").value;
let product=document.getElementById("product").value;

let message=`Hello, I want to order water.%0AName: ${name}%0AAddress: ${address}%0AProduct: ${product}`;

window.open(`https://wa.me/919300663888?text=${message}`);
}
</script>

</body>
</html>
